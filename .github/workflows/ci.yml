name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.7.0"
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Coverage
        run: pnpm test:coverage

  deterministic-setup-assignment-knowledge-projections-tasks-system-info-role-actions-philosopher-choice-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.7.0"
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Deterministic setup tests
        run: pnpm --filter @botc/setup-engine test

      - name: Deterministic assignment tests
        run: pnpm --filter @botc/assignment-engine test

      - name: Initial private knowledge tests
        run: pnpm --filter @botc/information-engine test

      - name: Projection leakage tests
        run: pnpm --filter @botc/projections test

      - name: First-night task plan tests
        run: pnpm --filter @botc/task-engine test

      - name: First-night system information, role action, and philosopher choice tests
        run: pnpm --filter @botc/application test
